name: Archive Wechat Linux Version

on:
  schedule:
    - cron: "0 7 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      publish:
        description: "Create the GitHub release (set false for local `act` testing)"
        type: boolean
        default: true

permissions:
  contents: write # needed to create the release

concurrency:
  group: archive-wechat-linux
  cancel-in-progress: false

jobs:
  archive_latest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test Github Action Server Time
        run: echo `date`

      - name: Download, verify, rename & checksum
        id: prepare
        env:
          # Only used for the "already released?" check inside the script.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./scripts/archive-latest.sh

      - name: Publish release
        # Skip if already released, or when explicitly disabled (e.g. local act run).
        if: steps.prepare.outputs.skip != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.publish == false)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.tag }}
          name: WeChat Linux ${{ steps.prepare.outputs.version }}
          body_path: dist/RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/WeChatLinux_*
